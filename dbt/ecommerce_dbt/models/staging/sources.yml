version: 2

sources:
  - name: raw
    database: nodal-triumph-495809-s2
    schema: raw
    description: "Raw data landed directly from the ELT pipeline"
    tables:
      - name: ecommerce_events
        description: "Raw e-commerce events generated by the pipeline"
        freshness:
          warn_after:  {count: 25, period: hour}
          error_after: {count: 48, period: hour}
        loaded_at_field: created_at
        columns:
          - name: event_id
            description: "Unique identifier for each event"
          - name: event_type
            description: "Type of event: page_view, add_to_cart, purchase, return"
          - name: user_id
            description: "Unique identifier for the user"
          - name: revenue
            description: "Revenue generated — only non-zero for purchase events"